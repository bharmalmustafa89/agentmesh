  #     SLACK_MCP_XOXC_TOKEN: ${SLACK_XOXC_TOKEN}
  #     SLACK_MCP_XOXD_TOKEN: ${SLACK_XOXD_TOKEN}

  # ─── Google Workspace (Gmail + Calendar + Drive) ──────────────────────────
  # Requires uvx (https://github.com/astral-sh/uv) and TWO files:
  #   ~/.config/agentmesh/.gauth.json      OAuth client credentials (Desktop app)
  #   ~/.config/agentmesh/.accounts.json   account list (per mcp-gsuite README)
  # First run opens a browser for OAuth; subsequent runs use the cached token.
  # gsuite:
  #   type: stdio
  #   name: gsuite
  #   enabled: true
  #   timeout: 90
  #   cmd: uvx
  #   args:
  #     - mcp-gsuite
  #     - --gauth-file
  #     - ~/.config/agentmesh/.gauth.json
  #     - --accounts-file
  #     - ~/.config/agentmesh/.accounts.json
