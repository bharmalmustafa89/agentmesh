version: "1.0.0"
title: pr-describe
description: |
  Draft a PR description from a git diff plus any related Linear issue,
  in the team's standard Summary / Why / Test plan format.
author:
  contact: agentmesh

parameters:
  - key: pr
    input_type: string
    requirement: optional
    default: ""
    description: PR number. Empty = uses the current branch's PR or unmerged diff.

  - key: repo
    input_type: string
    requirement: optional
    default: ""
    description: Path to the git repo. Empty = current working directory.

instructions: |
  You are drafting a pull request description. Be concrete; do not embellish.

  Steps:
  1. Resolve the diff:
     - If `pr` is set, use `gh pr diff <pr>` to fetch (requires `gh` CLI; if
       not authenticated, run `gh auth status` and surface the error).
     - Otherwise use the current branch's diff against the merge-base with
       the default branch. Find the default branch via
       `git symbolic-ref refs/remotes/origin/HEAD` (returns
       `refs/remotes/origin/<branch>`); fall back to `main`, then `master`,
       in that order if the symbolic-ref command fails.
  2. Identify the related Linear issue, in this order of preference:
     - An issue ID (e.g. `ENG-1234`) appears in any commit message on the
       branch — most reliable signal.
     - The branch name contains a Linear issue ID slug (common patterns:
       `<user>/<issue-id>-<slug>`, `<issue-id>-<slug>`, or
       `feat/<issue-id>-...`).
     - Search Linear for an open issue whose title closely matches the
       branch name or commit subject.
     - Linear MCP unavailable: skip this step and omit the footer.
  3. Read the diff carefully. Identify: behavior change, files touched,
     any tests added/modified.

  Output the PR body in this exact format:

  ```
  ## Summary
  <1-2 bullet points stating what changed>

  ## Why
  <1-3 sentences. If a Linear issue is linked, summarize its motivation.
   Otherwise infer from the code change.>

  ## Test plan
  - [ ] <bullet for each test path the reviewer should exercise>
  - [ ] <include unit/integration test runs if tests were added>
  ```

  Add a footer line linking the Linear issue if found:
  `Closes <ISSUE-ID>`

  Do not invent issues. If no Linear link is confidently found, omit the footer.

prompt: |
  Draft the PR description for PR={{ pr }} in repo={{ repo }} (empty values mean "use the current branch / repo").
