version: "1.0.0"
title: pr-describe
description: |
  Draft a PR description from a git diff plus any related Linear issue,
  in the team's standard Summary / Why / Test plan format.
author:
  contact: agentmesh

parameters:
  - key: pr
    input_type: string
    requirement: optional
    description: PR number. If unset, uses the current branch's PR or unmerged diff.

  - key: repo
    input_type: string
    requirement: optional
    description: Path to the git repo. Defaults to current working directory.

instructions: |
  You are drafting a pull request description. Be concrete; do not embellish.

  Steps:
  1. Resolve the diff:
     - If `pr` is set, use `gh pr diff <pr>` to fetch.
     - Otherwise use the current branch's diff against the merge-base with
       the default branch (main or master).
  2. Identify the related Linear issue:
     - Branch name pattern: `<user>/<issue-id>-<slug>` or
       `<user>/<descriptive>` linking to issue via commit messages.
     - Search Linear for an issue whose ID appears in any commit message
       on the branch.
  3. Read the diff carefully. Identify: behavior change, files touched,
     any tests added/modified.

  Output the PR body in this exact format:

  ```
  ## Summary
  <1-2 bullet points stating what changed>

  ## Why
  <1-3 sentences. If a Linear issue is linked, summarize its motivation.
   Otherwise infer from the code change.>

  ## Test plan
  - [ ] <bullet for each test path the reviewer should exercise>
  - [ ] <include unit/integration test runs if tests were added>
  ```

  Add a footer line linking the Linear issue if found:
  `Closes <ISSUE-ID>`

  Do not invent issues. If no Linear link is confidently found, omit the footer.

prompt: |
  Draft the PR description for {{ pr | default: "current branch" }} in {{ repo | default: "the current repo" }}.
